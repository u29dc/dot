# dotfiles-managed: codex-template
# profile: shared

model = "gpt-5.5"
review_model = "gpt-5.5"
personality = "pragmatic"
service_tier = "fast"

model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_supports_reasoning_summaries = true
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"

approval_policy = "never"
approvals_reviewer = "auto_review"
sandbox_mode = "danger-full-access"
web_search = "live"

background_terminal_max_timeout = 1800000
file_opener = "cursor"
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md", "README.md", "CONTEXT.md"]
project_doc_max_bytes = 64000
show_raw_agent_reasoning = true
suppress_unstable_features_warning = true

notify = ["__HOME__/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[shell_environment_policy]
ignore_default_excludes = false
inherit = "all"

[shell_environment_policy.set]
BUF = "__TOOLS_HOME__/buf/buf"
CHO = "__TOOLS_HOME__/cho/cho"
FIN = "__TOOLS_HOME__/fin/fin"
GRN = "__TOOLS_HOME__/grn/grn"
PDF = "__TOOLS_HOME__/pdf/pdf"
TAO = "__TOOLS_HOME__/tao/tao"

[features]
apply_patch_freeform = true
apps = false
external_migration = false
fast_mode = true
goals = true
guardian_approval = true
hooks = true
js_repl = false
memories = true
multi_agent = true
prevent_idle_sleep = true
shell_snapshot = true
terminal_resize_reflow = true
unified_exec = true

[agents]
job_max_runtime_seconds = 14400
max_depth = 2
max_threads = 8

[history]
max_bytes = 100000000
persistence = "save-all"

[notice]
hide_full_access_warning = true

[tui]
status_line = ["five-hour-limit", "context-used", "model-with-reasoning", "current-dir", "git-branch"]
theme = "github"

[mcp_servers.paper]
enabled = false
url = "http://127.0.0.1:29979/mcp"

[mcp_servers.node_repl]
args = []
command = "/Applications/Codex.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
BROWSER_USE_AVAILABLE_BACKENDS = "iab"
CODEX_CLI_PATH = "/Applications/Codex.app/Contents/Resources/codex"
CODEX_HOME = "__HOME__/.codex"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/Applications/Codex.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/Applications/Codex.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "__HOME__/.codex"
# dotfiles-managed: codex-node-repl-env

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = false

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[desktop]
default-service-tier = "fast"
followUpQueueMode = "steer"
keepRemoteControlAwakeWhilePluggedIn = true
notifications-turn-mode = "always"
preventSleepWhileRunning = true
reviewDelivery = "inline"
