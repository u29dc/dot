#:schema https://developers.openai.com/codex/config-schema.json

# # Codex Global Configuration
# ~/.codex/config.toml
# https://developers.openai.com/codex/config-basics
# https://developers.openai.com/codex/config-reference
# https://developers.openai.com/codex/config-sample
# https://developers.openai.com/codex/speed

profile = "full"

model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"
web_search = "live"

review_model = "gpt-5.4"
plan_mode_reasoning_effort = "xhigh"
show_raw_agent_reasoning = true
suppress_unstable_features_warning = true

model_context_window = 500000
model_auto_compact_token_limit = 300000
tool_output_token_limit = 20000
background_terminal_max_timeout = 1800000
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md", "README.md", "CONTEXT.md"]
project_doc_max_bytes = 64000
file_opener = "cursor"
personality = "pragmatic"

[sandbox_workspace_write]
network_access = true
exclude_slash_tmp = false
exclude_tmpdir_env_var = false
writable_roots = [
  "/tmp",
  "/Users/han/Git",
  "/Users/han/Library/CloudStorage/Dropbox",
]

[shell_environment_policy]
ignore_default_excludes = false
inherit = "all"

[features]
apply_patch_freeform = true
apps = false
fast_mode = true
multi_agent = true
shell_snapshot = true
unified_exec = true
js_repl = true
prevent_idle_sleep = true

[agents]
max_threads = 6
max_depth = 2
job_max_runtime_seconds = 7200

[history]
max_bytes = 100000000
persistence = "save-all"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[tui]
status_line = ["five-hour-limit", "context-used", "model-with-reasoning", "current-dir", "git-branch"]
theme = "github"

[profiles.full]
model = "gpt-5.4"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"
web_search = "live"

[profiles.balanced]
model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "medium"
web_search = "live"

[profiles.fast]
model = "gpt-5.3-codex-spark"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
web_search = "live"

[mcp_servers.paper]
enabled = false
url = "http://127.0.0.1:29979/mcp"

[projects."/Users/han/Git"]
trust_level = "trusted"

[projects."/Users/han/Library/CloudStorage/Dropbox"]
trust_level = "trusted"

[projects."/Users/han/Library/CloudStorage/Dropbox/VAULT"]
trust_level = "trusted"

[projects."/Users/han/Git/dot"]
trust_level = "trusted"

[projects."/Users/han/Git/tao"]
trust_level = "trusted"

[projects."/Users/han/Git/cho"]
trust_level = "trusted"

[projects."/Users/han/Git/fin"]
trust_level = "trusted"

[projects."/Users/han/Git/let"]
trust_level = "trusted"

[projects."/Users/han/Git/pdf"]
trust_level = "trusted"

[projects."/Users/han/Git/buf"]
trust_level = "trusted"

[projects."/Users/han/Git/ash"]
trust_level = "trusted"

[projects."/Users/han/Git/www"]
trust_level = "trusted"

[projects."/Users/han/Git/aix"]
trust_level = "trusted"

[projects."/Users/han/Git/tok"]
trust_level = "trusted"

[projects."/Users/han/Git/ray"]
trust_level = "trusted"

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[projects."/Users/han/Git/tab"]
trust_level = "trusted"
