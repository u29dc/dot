#:schema https://developers.openai.com/codex/config-schema.json

# Codex global configuration.
# Symlink target for ~/.codex/config.toml; contains durable defaults plus local
# Codex Desktop/runtime state. Keep secrets and private project details out.
# https://developers.openai.com/codex/config-basic
# https://developers.openai.com/codex/config-reference
# https://developers.openai.com/codex/config-sample
# https://developers.openai.com/codex/speed

# -----------------------------------------------------------------------------
# Model Defaults
# -----------------------------------------------------------------------------

model = "gpt-5.5"
review_model = "gpt-5.5"
personality = "pragmatic"
# service_tier = "fast"

model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "low"
plan_mode_reasoning_effort = "high"
model_supports_reasoning_summaries = true

# -----------------------------------------------------------------------------
# Execution Policy
# -----------------------------------------------------------------------------

approval_policy = "never"
approvals_reviewer = "auto_review"
sandbox_mode = "danger-full-access"
web_search = "live"

background_terminal_max_timeout = 1800000
# model_auto_compact_token_limit = 300000
# model_context_window = 500000
# tool_output_token_limit = 20000

file_opener = "cursor"
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md", "README.md", "CONTEXT.md"]
project_doc_max_bytes = 64000
show_raw_agent_reasoning = true
suppress_unstable_features_warning = true

notify = ["/Users/han/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]
service_tier = "fast"

# -----------------------------------------------------------------------------
# Shell Environment
# -----------------------------------------------------------------------------

[shell_environment_policy]
ignore_default_excludes = false
inherit = "all"

[shell_environment_policy.set]
BUF = "/Users/han/.tools/buf/buf"
CHO = "/Users/han/.tools/cho/cho"
FIN = "/Users/han/.tools/fin/fin"
PDF = "/Users/han/.tools/pdf/pdf"
TAO = "/Users/han/.tools/tao/tao"

# -----------------------------------------------------------------------------
# Feature Flags
# -----------------------------------------------------------------------------

[features]
apply_patch_freeform = true
apps = false
external_migration = false
fast_mode = false
goals = true
guardian_approval = true
js_repl = false
memories = true
multi_agent = true
prevent_idle_sleep = true
shell_snapshot = true
terminal_resize_reflow = true
unified_exec = true
hooks = true

# -----------------------------------------------------------------------------
# Agent Jobs and History
# -----------------------------------------------------------------------------

[agents]
job_max_runtime_seconds = 7200
max_depth = 2
max_threads = 6

[history]
max_bytes = 100000000
persistence = "save-all"

[notice]
hide_full_access_warning = true

# -----------------------------------------------------------------------------
# Terminal UI
# -----------------------------------------------------------------------------

[tui]
status_line = ["five-hour-limit", "context-used", "model-with-reasoning", "current-dir", "git-branch"]
theme = "github"

# -----------------------------------------------------------------------------
# MCP Servers
# -----------------------------------------------------------------------------

[mcp_servers.paper]
enabled = false
url = "http://127.0.0.1:29979/mcp"

[mcp_servers.node_repl]
args = []
command = "/Applications/Codex.app/Contents/Resources/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = ""
NODE_REPL_NODE_PATH = "/Applications/Codex.app/Contents/Resources/node"
NODE_REPL_TRUSTED_CODE_PATHS = "/Users/han/.codex"
CODEX_HOME = "/Users/han/.codex"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "0b0d41e7a14a4903d2f95b0b3f427ed796b12c8edca2fa392a03df43997075ae"
BROWSER_USE_AVAILABLE_BACKENDS = "iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
CODEX_CLI_PATH = "/Applications/Codex.app/Contents/Resources/codex"

[marketplaces.openai-bundled]
last_updated = "2026-06-01T18:22:22Z"
source_type = "local"
source = "/Users/han/.codex/.tmp/bundled-marketplaces/openai-bundled"

[marketplaces.openai-primary-runtime]
last_updated = "2026-06-01T18:43:47Z"
source_type = "local"
source = "/Users/han/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = false

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

# -----------------------------------------------------------------------------
# Codex-Managed Local State
# -----------------------------------------------------------------------------

[tui.model_availability_nux]
"gpt-5.5" = 4

# -----------------------------------------------------------------------------
# Desktop App Settings
# -----------------------------------------------------------------------------

[desktop]
appearanceDarkCodeThemeId = "codex"
appearanceLightCodeThemeId = "codex"
codeFontSize = 11
conversationDetailMode = "STEPS_EXECUTION"
followUpQueueMode = "steer"
keepRemoteControlAwakeWhilePluggedIn = true
notifications-turn-mode = "always"
preventSleepWhileRunning = true
reviewDelivery = "inline"
usePointerCursors = true
default-service-tier = "priority"

[desktop.appearanceDarkChromeTheme]
accent = "#0169cc"
contrast = 60
ink = "#fcfcfc"
opaqueWindows = true
surface = "#111111"

[desktop.appearanceDarkChromeTheme.fonts]
code = '"Geist Mono", ui-monospace, "SFMono-Regular"'
ui = "Inter"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#e02e2a"
skill = "#b06dff"

[desktop.appearanceLightChromeTheme]
accent = "#0169cc"
contrast = 40
ink = "#0d0d0d"
opaqueWindows = true
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]
code = '"Geist Mono", ui-monospace, "SFMono-Regular"'
ui = "Inter"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#e02e2a"
skill = "#751ed9"

[desktop.open-in-target-preferences]
global = "fileManager"

[desktop.open-in-target-preferences.perPath]
"/Users/han/Library/CloudStorage/Dropbox/VAULT" = "fileManager"

# -----------------------------------------------------------------------------
# Trusted Projects
# -----------------------------------------------------------------------------

[projects."/Users/han/Git"]
trust_level = "trusted"

[projects."/Users/han/Library/CloudStorage/Dropbox"]
trust_level = "trusted"

[projects."/Users/han/Library/CloudStorage/Dropbox/VAULT"]
trust_level = "trusted"

[projects."/Users/han/Git/aix"]
trust_level = "trusted"

[projects."/Users/han/Git/buf"]
trust_level = "trusted"

[projects."/Users/han/Git/cho"]
trust_level = "trusted"

[projects."/Users/han/Git/dot"]
trust_level = "trusted"

[projects."/Users/han/Git/fin"]
trust_level = "trusted"

[projects."/Users/han/Git/let"]
trust_level = "trusted"

[projects."/Users/han/Git/pdf"]
trust_level = "trusted"

[projects."/Users/han/Git/pop"]
trust_level = "trusted"

[projects."/Users/han/Git/ray"]
trust_level = "trusted"

[projects."/Users/han/Git/tao"]
trust_level = "trusted"

[projects."/Users/han/Git/www"]
trust_level = "trusted"
